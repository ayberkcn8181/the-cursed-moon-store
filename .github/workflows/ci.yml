name: CI
on:
  push:
    branches: [main, master]
  pull_request:

# ubuntu-latest ships libadwaita 1.5; gtk-rs libadwaita 0.8 needs >= 1.6.
jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          dnf -y install \
            gcc gcc-c++ clang make git curl \
            pkgconf-pkg-config \
            gtk4-devel libadwaita-devel \
            openssl-devel xz-devel
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build -p tcms-app
